version: '3.9'

services:
  backend:
    build: ./backend
    container_name: staax_backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: staax_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  db:
    image: postgres:16-alpine
    container_name: staax_db
    environment:
      POSTGRES_USER: staax
      POSTGRES_PASSWORD: staax_password
      POSTGRES_DB: staax_db
    ports:
      - "5432:5432"
    volumes:
      - staax_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: staax_redis
    ports:
      - "6379:6379"
    volumes:
      - staax_redisdata:/data

volumes:
  staax_pgdata:
  staax_redisdata:

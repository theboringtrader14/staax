# ── STAAX Backend API (api.lifexos.co.in) ───────────────────────────
server {
    listen 80;
    server_name api.lifexos.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.lifexos.co.in;

    ssl_certificate     /etc/letsencrypt/live/lifexos.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lifexos.co.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # WebSocket support for SmartStream
    location /ws {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_read_timeout  86400s;
    }
}


# LIFEX Platform — nginx configuration
# Server: 13.202.164.243 (AWS EC2 ap-south-1)
# Last updated: 2026-04-04

# ── LIFEX Landing (lifexos.co.in) ────────────────────────────────────
server {
    listen 80;
    server_name lifexos.co.in www.lifexos.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lifexos.co.in www.lifexos.co.in;

    ssl_certificate     /etc/letsencrypt/live/lifexos.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lifexos.co.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/lifex/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

